name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: pip install + CLI smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    env:
      # Force Python UTF-8 mode so Rich's unicode glyphs render in CI shells
      # (Windows runners default to cp1252, which can't encode ✻ U+273B etc).
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Smoke-test CLI flags
        shell: bash
        run: |
          set -e
          out=$(gemi --version)
          echo "version: $out"
          case "$out" in
            "gemi 0.1.0") ;;
            *) echo "::error::expected 'gemi 0.1.0', got '$out'"; exit 1 ;;
          esac
          gemi --help | grep -q "usage: gemi"
          # tool count moves up over time — just check it's healthy + structured
          tools_summary=$(gemi --list-tools 2>&1 | tail -1)
          echo "tools: $tools_summary"
          echo "$tools_summary" | grep -q "SAFE" || { echo "::error::list-tools missing SAFE row"; exit 1; }
          echo "$tools_summary" | grep -q "WRITE" || { echo "::error::list-tools missing WRITE row"; exit 1; }
          echo "$tools_summary" | grep -q "YOLO" || { echo "::error::list-tools missing YOLO row"; exit 1; }
          gemi --list-sessions > /dev/null

      - name: Compile-check every Python file
        run: |
          python -m compileall -q gemi
